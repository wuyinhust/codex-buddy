# ~/.codex/config.toml 示例
# 用于方案 A：直接在 Codex 配置中声明 CodeBuddy provider。
# 复制到 ~/.codex/config.toml，把 <你的 CodeBuddy2api 网关端口> 替换为实际端口。
# 若使用 opencodex，默认网关端口为 10100。

model = "auto-chat"
model_provider = "codebuddy"

[model_providers.codebuddy]
name = "CodeBuddy"
base_url = "http://127.0.0.1:10100/v1"
wire_api = "responses"
env_key = "CODEBUDDY_PROXY_KEY"
env_key_instructions = "任意非空值即可，真正鉴权在 CodeBuddy2api 层"
request_max_retries = 4
stream_max_retries = 5
stream_idle_timeout_ms = 300000
